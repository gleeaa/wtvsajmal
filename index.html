<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajmal P K — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Barlow+Condensed:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#030308;
  --cyan:#00f5d4;
  --crimson:#ff2d55;
  --white:#f0f0f0;
  --muted:rgba(240,240,240,0.42);
  --glass:rgba(255,255,255,0.035);
}
html{background:var(--void)}
body{
  background:var(--void);
  color:var(--white);
  font-family:'Barlow',sans-serif;
  overflow:hidden;
  height:100vh;
  width:100vw;
}
@media (hover:hover) and (pointer:fine){ body{ cursor:none; } }

@media (hover:none) and (pointer:coarse){
  body{ cursor:auto; }
  #cursor,#cursor-ring{ display:none; }
}

/* CUSTOM CURSOR */
#cursor{
  position:fixed;z-index:9999;
  width:10px;height:10px;
  background:var(--cyan);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
  will-change:transform;
}
#cursor-ring{
  position:fixed;z-index:9998;
  width:34px;height:34px;
  border:1px solid rgba(0,245,212,0.35);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  will-change:transform;
}
.cursor-hover #cursor{ width:36px;height:36px; background:var(--crimson); }
.cursor-hover #cursor-ring{ width:54px;height:54px; }
@media (prefers-reduced-motion:reduce){
  #cursor,#cursor-ring{ display:none; }
  body{ cursor:auto; }
}

#bg-canvas{
  position:fixed; inset:0; z-index:0; pointer-events:none;
}

#scroll-wrapper{
  position:fixed; inset:0; z-index:1; overflow:hidden;
}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:28px 48px;
}
.nav-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--cyan);
}
.nav-links{ display:flex;gap:36px;list-style:none; }
.nav-links a{
  font-size:11px;font-weight:500;letter-spacing:0.15em;
  text-transform:uppercase;color:rgba(240,240,240,0.5);
  text-decoration:none;transition:color 0.2s;
}
.nav-links a:hover{color:var(--white)}

/* SONAR DEPTH GAUGE — signature element, replaces boxy progress bar */
#gauge{
  position:fixed;right:40px;top:50%;
  transform:translateY(-50%);
  z-index:100;
  height:50vh;width:60px;
  display:flex;flex-direction:column;align-items:center;
  pointer-events:none;
}
#gauge-line{
  position:relative;width:1px;height:100%;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.12) 8%, rgba(255,255,255,0.12) 92%, transparent);
}
.gauge-tick{
  position:absolute;left:50%;
  width:9px;height:1px;
  background:rgba(255,255,255,0.18);
  transform:translateX(-50%);
}
.gauge-tick.active{ background:var(--cyan); width:16px; box-shadow:0 0 8px rgba(0,245,212,0.6); }
#gauge-dot{
  position:absolute;left:50%;
  width:7px;height:7px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 12px var(--cyan), 0 0 24px rgba(0,245,212,0.4);
  transform:translate(-50%,-50%);
  transition:top 0.1s linear;
}
#depth-indicator{
  position:fixed;left:48px;bottom:40px;z-index:100;
  font-family:'Space Mono',monospace;font-size:10px;
  color:rgba(240,240,240,0.3);letter-spacing:0.1em;
}
#depth-value{color:var(--cyan)}
#scroll-hint{
  position:fixed;right:112px;bottom:40px;z-index:100;
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(240,240,240,0.25);
  display:flex;align-items:center;gap:10px;
  animation:hintPulse 2s ease-in-out infinite;
}
#scroll-hint::before{ content:'';display:block;width:20px;height:1px;background:rgba(240,240,240,0.25); }
@keyframes hintPulse{0%,100%{opacity:0.4}50%{opacity:1}}

#scene{
  position:absolute;width:100%;height:100%;
  transform-style:preserve-3d;
}
#sections-container{ position:relative;width:100%;height:100%; }

.layer{
  position:absolute;left:50%;top:50%;
  transform-style:preserve-3d;
  will-change:transform,opacity,filter;
}

/* soft surface — no hard borders, soft glow edges instead of lines */
.surface{
  position:relative;
  padding:8px 4px;
}

.eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:0.32em;
  text-transform:uppercase;color:var(--cyan);
  margin-bottom:22px;display:flex;align-items:center;gap:12px;
}
.eyebrow::after{ content:'';display:block;height:1px;width:40px;background:var(--cyan);opacity:0.4; }

/* ---- HERO ---- */
.hero-name{
  font-family:'Barlow',sans-serif;
  font-size:clamp(64px,9vw,124px);
  font-weight:900;line-height:0.88;letter-spacing:-0.03em;
  text-transform:uppercase;
  transition:font-weight 0.08s,font-style 0.08s;
}
.hero-name .ghost{ display:block;color:transparent;-webkit-text-stroke:1px rgba(240,240,240,0.15); }
.hero-sub{
  font-size:13px;color:var(--muted);margin-top:24px;
  max-width:320px;line-height:1.8;
}
.hero-badges{ display:flex;flex-wrap:wrap;gap:10px;margin-top:30px; }
.hero-badge{
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  padding:7px 16px;border:1px solid rgba(0,245,212,0.25);
  color:var(--cyan);border-radius:999px;
}

/* ---- ABOUT (organic two-column, offset, no box) ---- */
.about-wrap{ position:relative; }
.about-num{
  position:absolute;top:-60px;left:-40px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:220px;font-weight:300;line-height:1;
  color:transparent;-webkit-text-stroke:1px rgba(0,245,212,0.1);
  z-index:-1;pointer-events:none;
  user-select:none;
}
.section-title{
  font-family:'Barlow',sans-serif;
  font-size:clamp(36px,5vw,62px);font-weight:900;line-height:0.95;
  text-transform:uppercase;letter-spacing:-0.02em;
}
.section-title .line2{ color:transparent;-webkit-text-stroke:1px rgba(240,240,240,0.2); }
.about-body{ max-width:420px;margin-top:18px; }
.about-body p{ font-size:13px;line-height:1.95;color:rgba(240,240,240,0.7);margin-bottom:18px; }
.award-banner{
  display:flex;align-items:center;gap:20px;padding:18px 0 18px 24px;
  border-left:1px solid rgba(0,245,212,0.3);
  margin-top:8px;max-width:420px;
}
.award-text .title{ font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase; }
.award-text .sub{ font-size:11px;color:var(--muted);margin-top:3px; }

/* ---- STATS — sonar pings, scattered, not a grid ---- */
.stats-scatter{ position:relative;width:680px;height:280px; }
.ping{ position:absolute;text-align:center; }
.ping-num{ font-family:'Barlow Condensed',sans-serif;font-weight:700;line-height:1;color:var(--white); }
.ping-num em{ color:var(--cyan);font-style:normal; }
.ping-lbl{
  font-size:9.5px;font-weight:500;letter-spacing:0.13em;text-transform:uppercase;
  color:var(--muted);margin-top:6px;max-width:140px;
}
.ping::before{
  content:'';position:absolute;left:50%;top:50%;
  width:90px;height:90px;border-radius:50%;
  border:1px solid rgba(0,245,212,0.08);
  transform:translate(-50%,-50%);z-index:-1;
}

/* ---- PROJECTS — staggered organic cards, soft glow not boxes ---- */
.projects-flow{ position:relative;width:760px; }
.project-card{
  position:relative;
  padding:30px 8px 30px 28px;
  border-left:1px solid rgba(255,255,255,0.08);
  margin-bottom:6px;
  transition:border-color 0.4s,padding-left 0.4s;
}
.project-card:nth-child(2){ margin-left:90px; }
.project-card:nth-child(3){ margin-left:36px; }
.project-card:nth-child(4){ margin-left:120px; }
.project-card:hover{ border-color:rgba(0,245,212,0.5);padding-left:38px; }
.project-tag{ font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--crimson);margin-bottom:14px; }
.project-title{ font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:700;text-transform:uppercase;letter-spacing:0.02em;margin-bottom:10px; }
.project-title a{ color:inherit; text-decoration:none; }
.project-link-info{ font-size:11px;color:rgba(240,240,240,0.55);margin-top:8px; }
.project-link-info a{ color:var(--cyan); text-decoration:underline; }
.project-desc{ font-size:12px;color:var(--muted);line-height:1.75;max-width:420px; }
.project-stack{ display:flex;flex-wrap:wrap;gap:7px;margin-top:16px; }
.stack-chip{ font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border:1px solid rgba(255,255,255,0.1);color:rgba(240,240,240,0.5);border-radius:999px; }

/* ---- SKILLS — two loose flowing columns, varied indent ---- */
.skills-flow{ display:flex;gap:80px; }
.skill-col{ display:flex;flex-direction:column;gap:22px; }
.skill-col:nth-child(2){ margin-top:38px; }
.skill-row{ display:flex;align-items:center;gap:16px; }
.skill-name{ font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:0.03em;min-width:200px; }
.skill-level{ display:flex;gap:4px; }
.skill-pip{ width:18px;height:3px;border-radius:2px;background:rgba(255,255,255,0.1); }
.skill-pip.on{ background:var(--cyan); }
.skill-pip.on.hot{ background:var(--crimson); }

/* ---- LEADERSHIP — offset cards, no grid lines ---- */
.leader-flow{ position:relative;width:740px; }
.leader-card{ position:relative;padding:28px 24px 28px 34px;margin-bottom:30px;max-width:420px; }
.leader-card:nth-child(2){ margin-left:320px;margin-top:-60px; }
.leader-card:nth-child(4){ margin-left:320px; }
.leader-card::before{ content:'';position:absolute;top:14px;left:14px;width:2px;height:calc(100% - 28px);background:var(--cyan);opacity:0.5; }
.leader-card.alt::before{ background:var(--crimson); }
.leader-role{ font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px; }
.leader-card.alt .leader-role{ color:var(--crimson); }
.leader-title{ font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;margin-bottom:7px; }
.leader-desc{ font-size:11.5px;color:var(--muted);line-height:1.8; }

/* ---- STARTUP ---- */
.startup-wrap{ max-width:580px; }
.startup-wrap p{ font-size:13px;line-height:1.95;color:rgba(240,240,240,0.7);margin-bottom:16px; }

/* ---- CONTACT ---- */
.contact-name{
  font-family:'Barlow',sans-serif;font-size:clamp(48px,7vw,98px);font-weight:900;
  text-transform:uppercase;letter-spacing:-0.02em;line-height:0.9;
}
.contact-sub{ font-size:13px;color:var(--muted);margin-top:24px;line-height:1.8;max-width:380px; }
.contact-links{ display:flex;gap:28px;margin-top:38px;flex-wrap:wrap; }
.contact-link{
  font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--cyan);text-decoration:none;border-bottom:1px solid rgba(0,245,212,0.3);
  padding-bottom:3px;transition:border-color 0.2s;
}
.contact-link:hover{ border-color:var(--cyan); }
.footer-line{
  margin-top:60px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.06);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
}
.footer-line span{ font-size:10px;color:var(--muted);letter-spacing:0.1em; }

#noise{
  position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
#scanline{
  position:fixed;top:-100%;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  z-index:200;opacity:0;pointer-events:none;
}

@media (max-width: 880px){
  #gauge{ display:none; }
  .stats-scatter{ width:100%;height:auto;display:flex;flex-direction:column;gap:24px; }
  .ping{ position:relative !important;top:auto !important;left:auto !important; }
  .ping::before{ display:none; }
  .leader-card:nth-child(2),.leader-card:nth-child(4){ margin-left:0;margin-top:0; }
  .skills-flow{ flex-direction:column;gap:24px; }
  .skill-col:nth-child(2){ margin-top:0; }
  .project-card:nth-child(2),.project-card:nth-child(3),.project-card:nth-child(4){ margin-left:0; }
}

@media (max-width: 640px) {
  body { touch-action: pan-y; }
  nav { padding:18px 20px; }
  .nav-logo { font-size:11px; }
  .nav-links { gap:14px; flex-wrap:wrap; justify-content:flex-end; }
  .nav-links a { font-size:9px; }
  #depth-indicator, #scroll-hint { display:none; }
  #gauge { display:none; }
  .surface { width:min(92vw, 640px) !important; padding:20px 18px 24px; }
  .eyebrow { margin-bottom:18px; }
  .hero-name { font-size:clamp(44px,13vw,72px); }
  .hero-sub, .about-body, .project-desc, .contact-sub { max-width:100%; }
  .hero-badges, .contact-links { gap:10px; }
  .award-banner { flex-direction:column; align-items:flex-start; gap:12px; padding:16px 0 16px 20px; }
  .about-num { display:none; }
  .stats-scatter { width:100%; height:auto; padding:8px 0; }
  .ping { position:relative !important; top:auto !important; left:auto !important; width:100%; text-align:left; padding-left:8px; }
  .ping-num { font-size:32px !important; }
  .ping-lbl { max-width:100%; }
  .project-card { padding:22px 18px 22px 18px; margin-bottom:18px; border-left:none; border-top:1px solid rgba(255,255,255,0.08); }
  .project-card:hover { padding-left:18px; }
  .project-card:nth-child(2),.project-card:nth-child(3),.project-card:nth-child(4){ margin-left:0; }
  .project-title { font-size:20px; }
  .project-stack { gap:8px; }
  .skills-flow { gap:18px; }
  .skill-row { flex-wrap:wrap; align-items:flex-start; }
  .skill-name { min-width:auto; width:100%; }
  .leader-flow { width:100%; }
  .leader-card { max-width:100%; padding:24px 18px; margin-left:0; margin-top:0; }
  .leader-card:nth-child(2), .leader-card:nth-child(4) { margin-left:0; margin-top:0; }
  .startup-wrap { max-width:100%; }
  .footer-line { flex-direction:column; align-items:flex-start; gap:10px; }
}
</style>
</head>
<body>

<div id="noise"></div>
<div id="scanline"></div>
<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="bg-canvas"></canvas>

<nav>
  <div class="nav-logo">APK.portfolio</div>
  <ul class="nav-links">
    <li><a href="#" data-nav="0">Home</a></li>
    <li><a href="#" data-nav="2">About</a></li>
    <li><a href="#" data-nav="3">Work</a></li>
    <li><a href="#" data-nav="4">Skills</a></li>
    <li><a href="#" data-nav="7">Contact</a></li>
  </ul>
</nav>

<div id="gauge">
  <div id="gauge-line">
    <div id="gauge-dot"></div>
  </div>
</div>

<div id="depth-indicator">DEPTH <span id="depth-value">000.0</span>m</div>
<div id="scroll-hint">scroll to dive</div>

<div id="scroll-wrapper">
  <div id="scene">
    <div id="sections-container"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ─── SECTIONS DATA ────────────────────────────────────────────────
const sections = [

const TOTAL = sections.length;
const Z_STEP = 1700;          // distance between sections
const MAX_VISIBLE_DIST = 1.35; // how many "sections" away before fully invisible — keeps things from vanishing

// ─── INJECT SECTIONS ──────────────────────────────────────────────
const container = document.getElementById('sections-container');
const layerEls = sections.map((s, i) => {
  const div = document.createElement('div');
  div.className = 'layer';
  div.id = `layer-${s.id}`;
  div.style.transform = `translate(-50%,-50%) translate3d(${s.x}px,${s.y}px,${-i * Z_STEP}px)`;
  div.innerHTML = s.html;
  container.appendChild(div);
  return div;
});

// gauge ticks
const gaugeLine = document.getElementById('gauge-line');
const ticks = sections.map((_, i) => {
  const t = document.createElement('div');
  t.className = 'gauge-tick';
  t.style.top = `${(i / (TOTAL - 1)) * 100}%`;
  gaugeLine.appendChild(t);
  return t;
});
const gaugeDot = document.getElementById('gauge-dot');

// ─── SCROLL / CAMERA ENGINE ───────────────────────────────────────
let scrollZ = 0;
let targetScrollZ = 0;
let currentSectionIndex = 0;

function clampTarget(z){
  return Math.max(0, Math.min((TOTAL - 1) * Z_STEP, z));
}

function renderCamera(){
  scrollZ += (targetScrollZ - scrollZ) * 0.09;
  if (Math.abs(targetScrollZ - scrollZ) < 0.05) scrollZ = targetScrollZ;

  container.style.transform = `translateZ(${scrollZ}px)`;

  const currentSection = scrollZ / Z_STEP;
  document.getElementById('depth-value').textContent = (scrollZ / 100).toFixed(1).padStart(5,'0');
  gaugeDot.style.top = `${(Math.min(Math.max(currentSection,0),TOTAL-1) / (TOTAL-1)) * 100}%`;

  ticks.forEach((t,i)=> t.classList.toggle('active', Math.round(currentSection) === i));

  layerEls.forEach((el,i)=>{
    const dist = Math.abs(i - currentSection);
    // clamp so opacity never fully collapses to 0 right at transition edges,
    // and so far layers don't render past the camera (the old bug)
    const norm = Math.min(dist / MAX_VISIBLE_DIST, 1);
    const opacity = Math.max(0, 1 - norm);
    const blur = norm * 6;
    el.style.opacity = opacity.toFixed(3);
    el.style.filter = norm > 0.08 ? `blur(${blur.toFixed(1)}px)` : 'none';
    el.style.pointerEvents = opacity > 0.5 ? 'auto' : 'none';
  });

  requestAnimationFrame(renderCamera);
}
requestAnimationFrame(renderCamera);

// ─── SCROLL INPUT ──────────────────────────────────────────────────
let scrollCooldown = false;
function goToIndex(i){
  currentSectionIndex = Math.max(0, Math.min(TOTAL - 1, i));
  targetScrollZ = clampTarget(currentSectionIndex * Z_STEP);
  flashScanline();
}
function flashScanline(){
  const scanline = document.getElementById('scanline');
  gsap.killTweensOf(scanline);
  gsap.fromTo(scanline, {top:'-2px',opacity:0.7}, {top:'110%',opacity:0,duration:0.55,ease:'power1.in'});
}

window.addEventListener('wheel', (e)=>{
  e.preventDefault();
  if (scrollCooldown) return;
  const dir = e.deltaY > 0 ? 1 : -1;
  goToIndex(currentSectionIndex + dir);
  scrollCooldown = true;
  setTimeout(()=>{ scrollCooldown = false; }, 550);
}, {passive:false});

let touchStartY = 0;
window.addEventListener('touchstart', e=>{ touchStartY = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', e=>{
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40 && !scrollCooldown){
    goToIndex(currentSectionIndex + (dy > 0 ? 1 : -1));
    scrollCooldown = true;
    setTimeout(()=>{ scrollCooldown = false; }, 550);
  }
}, {passive:true});

document.querySelectorAll('[data-nav]').forEach(a=>{
  a.addEventListener('click', e=>{ e.preventDefault(); goToIndex(parseInt(a.dataset.nav,10)); });
});

document.addEventListener('keydown', e=>{
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goToIndex(currentSectionIndex + 1);
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') goToIndex(currentSectionIndex - 1);
  if (e.key >= '1' && e.key <= '8') goToIndex(parseInt(e.key,10) - 1);
});

// ─── SINGLE CONSOLIDATED MOUSEMOVE HANDLER (perf fix) ─────────────
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
const heroName = document.getElementById('hero-name');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let mouseX = innerWidth/2, mouseY = innerHeight/2;
let prevX = mouseX, prevY = mouseY;
let ringX = mouseX, ringY = mouseY;
let velocity = 0;
let tiltRX = 0, tiltRY = 0;

if (!reduceMotion){
  document.addEventListener('mousemove', (e)=>{
    mouseX = e.clientX; mouseY = e.clientY;
    const dx = mouseX - prevX, dy = mouseY - prevY;
    velocity = Math.sqrt(dx*dx + dy*dy);
    prevX = mouseX; prevY = mouseY;

    if (heroName){
      const weight = Math.max(300, 900 - velocity * 18);
      heroName.style.fontWeight = Math.round(weight);
      heroName.style.fontStyle = velocity > 4 ? 'italic' : 'normal';
    }

    tiltRX = (mouseY / innerHeight - 0.5) * 3;
    tiltRY = (mouseX / innerWidth - 0.5) * -3;

    const hoverTarget = e.target.closest('a, .project-card, .contact-link, [data-nav]');
    document.body.classList.toggle('cursor-hover', !!hoverTarget);
  }, {passive:true});
}

function renderCursorAndTilt(){
  if (!reduceMotion){
    cursor.style.transform = `translate(${mouseX - 5}px, ${mouseY - 5}px)`;
    ringX += (mouseX - ringX) * 0.18;
    ringY += (mouseY - ringY) * 0.18;
    cursorRing.style.transform = `translate(${ringX - 17}px, ${ringY - 17}px)`;
    container.style.transform += ''; // no-op kept out — tilt applied below via rotate wrapper
  }
  requestAnimationFrame(renderCursorAndTilt);
}
requestAnimationFrame(renderCursorAndTilt);

// Parallax tilt — folded into the same rAF-driven transform as scroll,
// applied to #scene (parent) instead of fighting container's translateZ
const scene = document.getElementById('scene');
let curRX = 0, curRY = 0;
function renderTilt(){
  if (!reduceMotion){
    curRX += (tiltRX - curRX) * 0.08;
    curRY += (tiltRY - curRY) * 0.08;
    scene.style.transform = `rotateX(${curRX}deg) rotateY(${curRY}deg)`;
  }
  requestAnimationFrame(renderTilt);
}
requestAnimationFrame(renderTilt);

// ─── LIGHTWEIGHT WEBGL BACKGROUND (throttled, lower res) ──────────
const bgCanvas = document.getElementById('bg-canvas');
const gl = bgCanvas.getContext('webgl', {antialias:false, alpha:false});

const RENDER_SCALE = 0.55; // render at lower internal resolution, upscaled via CSS — big perf win
function resizeBg(){
  bgCanvas.width = Math.floor(innerWidth * RENDER_SCALE);
  bgCanvas.height = Math.floor(innerHeight * RENDER_SCALE);
  bgCanvas.style.width = '100%';
  bgCanvas.style.height = '100%';
  if (gl) gl.viewport(0,0,bgCanvas.width,bgCanvas.height);
}
resizeBg();
window.addEventListener('resize', resizeBg);

if (gl && !reduceMotion){
  const vertSrc = `attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos,0.0,1.0); }`;
  const fragSrc = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_resolution;
    uniform vec2 u_mouse;
    uniform float u_depth;

    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float noise(vec2 p){
      vec2 i=floor(p); vec2 f=fract(p);
      vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(hash(i),hash(i+vec2(1,0)),u.x), mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x), u.y);
    }
    float fbm(vec2 p){
      float v=0.0; float a=0.5;
      for(int i=0;i<3;i++){ v += a*noise(p); p *= 2.0; a *= 0.5; }
      return v;
    }
    void main(){
      vec2 uv = gl_FragCoord.xy / u_resolution;
      vec2 mu = (u_mouse / u_resolution) * 2.0 - 1.0;
      float t = u_time * 0.12 + u_depth * 0.25;

      vec2 q = vec2(fbm(uv*2.0+t), fbm(uv*2.0+vec2(1.5,3.7)+t));
      float f = fbm(uv*1.4 + 2.0*q);

      float mdist = length(uv - vec2(mu.x*0.5+0.5, -mu.y*0.5+0.5));
      f += 0.12*exp(-mdist*4.0);

      float cyan = smoothstep(0.3,0.6,f)*smoothstep(0.8,0.5,f);
      float crimson = smoothstep(0.5,0.8,f)*smoothstep(1.0,0.7,f);

      vec3 col = vec3(0.012,0.012,0.03);
      col += vec3(0.0,0.96,0.83)*cyan*0.11;
      col += vec3(1.0,0.18,0.33)*crimson*0.07;

      float vig = uv.x*uv.y*(1.0-uv.x)*(1.0-uv.y)*12.0;
      col *= vig;

      gl_FragColor = vec4(clamp(col,0.0,1.0), 1.0);
    }
  `;
  function compile(src,type){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(vertSrc, gl.VERTEX_SHADER));
  gl.attachShader(prog, compile(fragSrc, gl.FRAGMENT_SHADER));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

  const uTime = gl.getUniformLocation(prog,'u_time');
  const uRes = gl.getUniformLocation(prog,'u_resolution');
  const uMouse = gl.getUniformLocation(prog,'u_mouse');
  const uDepth = gl.getUniformLocation(prog,'u_depth');

  // throttle to ~30fps for the shader — visually identical, half the GPU cost
  let lastFrame = 0;
  function renderBg(t){
    if (t - lastFrame > 33){
      lastFrame = t;
      gl.uniform1f(uTime, t*0.001);
      gl.uniform2f(uRes, bgCanvas.width, bgCanvas.height);
      gl.uniform2f(uMouse, mouseX * RENDER_SCALE, (innerHeight - mouseY) * RENDER_SCALE);
      gl.uniform1f(uDepth, scrollZ / Z_STEP);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    }
    requestAnimationFrame(renderBg);
  }
  requestAnimationFrame(renderBg);
} else if (gl) {
  // reduced-motion: paint a single static frame and stop
  gl.clearColor(0.012,0.012,0.03,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
}

// ─── INTRO ──────────────────────────────────────────────────────────
gsap.from('nav', { y:-20, opacity:0, duration:1, ease:'power3.out', delay:0.3 });
gsap.from('#depth-indicator', { x:-20, opacity:0, duration:1, ease:'power3.out', delay:0.6 });
gsap.from('#scroll-hint', { x:20, opacity:0, duration:1, ease:'power3.out', delay:0.8 });
gsap.from('#gauge', { opacity:0, duration:1, ease:'power3.out', delay:0.7 });
gsap.from(layerEls[0], { opacity:0, duration:1.2, ease:'power3.out', delay:0.4 });
</script>
